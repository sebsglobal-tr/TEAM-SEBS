<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkTrack Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 24px;
      min-height: 100vh;
    }
    .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }
    .status-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .status-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
    .status-value { font-size: 1.25rem; font-weight: 600; margin-top: 4px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat { background: #1e293b; border-radius: 10px; padding: 12px; text-align: center; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #3b82f6; }
    .stat-label { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: #334155; color: #f1f5f9; }
    .btn-danger { background: #ef4444; color: white; }
    .transparency {
      margin-top: 24px;
      padding: 16px;
      background: #1e293b;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    .login-form input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="login-view">
    <div class="logo">WorkTrack Agent</div>
    <p class="subtitle">Şeffaf çalışma takibi</p>
    <div class="login-form">
      <input type="email" id="email" placeholder="E-posta" />
      <input type="password" id="password" placeholder="Şifre" />
      <button class="btn btn-primary" id="login-btn">Giriş Yap</button>
    </div>
  </div>

  <div id="main-view" style="display: none;">
    <div class="logo">WorkTrack Agent</div>
    <p class="subtitle">Çalışma durumunuz</p>

    <div class="status-card">
      <div class="status-label">Anlık Durum</div>
      <div class="status-value" id="current-status">Çevrimdışı</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="active-time">0dk</div>
        <div class="stat-label">Aktif</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="idle-time">0dk</div>
        <div class="stat-label">Boşta</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="break-time">0dk</div>
        <div class="stat-label">Mola</div>
      </div>
    </div>

    <button class="btn btn-primary" id="start-btn">Çalışmaya Başla</button>
    <button class="btn btn-secondary" id="break-btn" style="display:none;">Mola Başlat</button>
    <button class="btn btn-secondary" id="end-break-btn" style="display:none;">Mola Bitir</button>
    <button class="btn btn-danger" id="stop-btn" style="display:none;">Çalışmayı Bitir</button>

    <div class="transparency">
      <strong>Şeffaflık:</strong> Bu uygulama yalnızca çalışma süresi, idle durumu ve ekran kilidi olaylarını takip eder.
      Klavye kaydı, ekran görüntüsü veya gizli izleme yapılmaz.
    </div>
  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
